function renderMarkdown(md) {
  if (!md) return "";
  return md
    .replace(/^### (.+)$/gm, '<h3 class="text-base font-semibold mt-6 mb-2 text-[var(--heading)]">$1</h3>')
    .replace(/^## (.+)$/gm, '<h2 class="text-lg font-bold mt-8 mb-3 text-[var(--heading)] border-b border-[var(--border)] pb-2">$1</h2>')
    .replace(/^# (.+)$/gm, '<h1 class="text-xl font-bold mt-8 mb-4 text-[var(--heading)]">$1</h1>')
    .replace(/^> (.+)$/gm, '<blockquote class="border-l-3 border-[var(--accent)] pl-4 my-3 text-[var(--muted)] italic">$1</blockquote>')
    .replace(/^- \[( |x)\] (.+)$/gm, (_, c, t) => `<div class="flex items-start gap-2 my-1"><span class="mt-0.5 text-sm">${c === 'x' ? '☑' : '☐'}</span><span>${t}</span></div>`)
    .replace(/^- (.+)$/gm, '<div class="flex items-start gap-2 my-1"><span class="text-[var(--accent)] mt-1 text-xs">●</span><span>$1</span></div>')
    .replace(/^---$/gm, '<hr class="my-6 border-[var(--border)]" />')
    .replace(/\n{2,}/g, '<div class="h-3"></div>')
    .replace(/\n/g, "<br/>");
}

// ── 다운로드 센터 컴포넌트 ──
function DownloadCenter({ response, oneulResult, naeirResult, selectedPath, gasUrl, downloadAsWord }) {
  const [generating, setGenerating] = useState(null);
  const [statusMsg, setStatusMsg] = useState("");

  // GAS에서 데이터 추출 + 템플릿 서식 생성
  const generateFromTemplate = async (type) => {
    if (type === "interview") {
      setStatusMsg("면접지 생성 중...");
      const genRes = await fetch(gasUrl, {
        method: "POST",
        redirect: "follow",
        body: JSON.stringify({
          action: "generateInterview",
          data: { counselor: "" },
          participant: { code: response.code, org: response.org },
        }),
      });
      const genData = await genRes.json();
      if (!genData.success) throw new Error(genData.error || "면접지 생성 실패");
      return genData;
    }

    // 1단계: AI로 구조화된 데이터 추출
    setStatusMsg(type === "iap" ? "IAP 데이터 추출 중..." : "ISP 데이터 추출 중...");
    const extractAction = type === "iap" ? "extractForIAP" : "extractForISP";
    const extractRes = await fetch(gasUrl, {
      method: "POST",
      redirect: "follow",
      body: JSON.stringify({
        action: extractAction,
        oneulResult,
        naeirResult,
        selectedPath: selectedPath || "",
      }),
    });
    const extractData = await extractRes.json();
    if (!extractData.success) throw new Error(extractData.error || "데이터 추출 실패");

    // 2단계: 추출된 데이터로 템플릿 서식 생성
    setStatusMsg(type === "iap" ? "IAP 서식 생성 중..." : "ISP 서식 생성 중...");
    const generateAction = type === "iap" ? "generateIAP" : "generateISP";
    const genRes = await fetch(gasUrl, {
      method: "POST",
      redirect: "follow",
      body: JSON.stringify({
        action: generateAction,
        data: extractData.data,
        participant: { code: response.code, org: response.org },
      }),
    });
    const genData = await genRes.json();
    if (!genData.success) throw new Error(genData.error || "서식 생성 실패");
    return genData;
  };

  const downloadItem = async (type) => {
    setGenerating(type);
    setStatusMsg("");
    try {
      const result = await generateFromTemplate(type);
      setStatusMsg("다운로드 준비 완료!");
      window.open(result.fileUrl, "_blank");
    } catch (err) {
      alert((type === "iap" ? "IAP" : type === "isp" ? "ISP" : "면접지") + " 생성 오류: " + err.message);
    }
    setGenerating(null);
    setStatusMsg("");
  };

  const downloadIntegrated = () => {
    const report = `# 프로젝트 내일로 종합 분석 리포트\n\n참여자: ${response.code}\n소속: ${response.org}\n분석일: ${new Date().toLocaleDateString("ko-KR")}\n선택 경로: ${selectedPath || "미선택"}\n\n---\n\n## Part 1. 심층 DNA 분석 (오늘은)\n\n${oneulResult}\n\n---\n\n## Part 2. 실행 계획 설계 (내일로)\n\n${naeirResult}\n\n---\n\n> 본 리포트는 2개의 독립적인 AI 분석 프롬프트를 통해 생성되었습니다.\n> 충북청주지역자활센터 프로젝트 내일로 v2.0`;
    downloadAsWord(report, `내일로_종합리포트_${response.code}`);
  };

  const downloadAll = async () => {
    setGenerating("all");
    try {
      await downloadItem("iap");
      await downloadItem("isp");
      await downloadItem("interview");
      downloadIntegrated();
    } catch (err) {
      alert("일괄 다운로드 중 오류: " + err.message);
    }
    setGenerating(null);
  };

  const items = [
    { id: "iap", icon: "📋", label: "IAP 서식", desc: "자립경로 (약점/강점, 단·중·장기 목표, 자활경로)", ext: ".xlsx", action: () => downloadItem("iap") },
    { id: "isp", icon: "📊", label: "ISP 서식", desc: "자활지원계획 (욕구영역, 합의 목표, 실행과제)", ext: ".xlsx", action: () => downloadItem("isp") },
    { id: "interview", icon: "📄", label: "기본면접지", desc: "참여자 기본면접기록지 (상담일자 자동 입력)", ext: ".xlsx", action: () => downloadItem("interview") },
    { id: "word", icon: "📝", label: "종합 리포트", desc: "오늘은 + 내일로 전체 분석 결과", ext: ".doc", action: downloadIntegrated },
  ];

  return (
    <div className="rounded-xl overflow-hidden mb-4" style={{ border: "1px solid var(--border)" }}>
      <div className="px-4 py-3 flex items-center justify-between" style={{ background: "rgba(91,141,239,0.06)", borderBottom: "1px solid var(--border)" }}>
        <div className="flex items-center gap-2">
          <Icons.Download />
          <span className="text-xs font-bold" style={{ color: "var(--accent)" }}>다운로드 센터</span>
        </div>
        <button onClick={downloadAll} disabled={generating}
          className="text-[10px] px-3 py-1 rounded-full font-medium transition-all"
          style={{ background: generating ? "var(--surface-active)" : "var(--accent)", color: generating ? "var(--muted)" : "#fff" }}>
          {generating === "all" ? "생성 중..." : "전체 다운로드"}
        </button>
      </div>
      {statusMsg && (
        <div className="px-4 py-2 flex items-center gap-2" style={{ background: "var(--surface-active)" }}>
          <Icons.Spinner />
          <span className="text-[10px]" style={{ color: "var(--accent)" }}>{statusMsg}</span>
        </div>
      )}
      <div className="divide-y" style={{ background: "var(--surface)", borderColor: "var(--border-light)" }}>
        {items.map((item) => (
          <button key={item.id} onClick={item.action} disabled={generating}
            className="w-full text-left px-4 py-3 flex items-center gap-3 transition-all"
            style={{ opacity: generating && generating !== item.id && generating !== "all" ? 0.5 : 1 }}
            onMouseEnter={(e) => { if (!generating) e.currentTarget.style.background = "var(--surface-hover)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}>
            <span className="text-lg">{item.icon}</span>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2">
                <span className="text-xs font-semibold" style={{ color: "var(--text)" }}>{item.label}</span>
                <span className="text-[10px] px-1.5 py-0.5 rounded" style={{ background: "var(--surface-active)", color: "var(--muted)" }}>{item.ext}</span>
              </div>
              <p className="text-[10px] mt-0.5 truncate" style={{ color: "var(--muted)" }}>{item.desc}</p>
            </div>
            {generating === item.id || generating === "all" ? (
              <div style={{ color: "var(--accent)" }}><Icons.Spinner /></div>
            ) : (
              <div style={{ color: "var(--muted)" }}><Icons.ChevronRight /></div>
            )}
          </button>
        ))}
      </div>
      <div className="px-4 py-2" style={{ background: "var(--bg)", borderTop: "1px solid var(--border-light)" }}>
        <p className="text-[10px]" style={{ color: "var(--muted)" }}>
          원본 서식이 100% 유지됩니다. AI가 분석 결과를 해당 셀에 자동 입력합니다. 다운로드 후 참여자 인적사항을 보완해 주세요.
        </p>
      </div>
    </div>
  );
}

        {state === "idle" && (
          <div className="p-4">
            <p className="text-xs mb-3" style={{ color: "var(--text-secondary)" }}>
              {isOneul
                ? "참여자의 심리 성향, 인생 서사, SWOT 진단, IAP 계획을 분석합니다."
                : "3년 자활 로드맵, 당월 실천 계획, 주간 모니터링 일지를 설계합니다."}
            </p>
            {disabled ? (
              <div className="text-center py-2">
                <p className="text-xs" style={{ color: "var(--muted)" }}>{disabledReason}</p>
              </div>
            ) : (
              <button
                onClick={onRun}
                className="w-full flex items-center justify-center gap-2 py-3 rounded-lg text-sm font-semibold transition-all duration-200"
                style={{ background: color, color: "#fff" }}
                onMouseEnter={(e) => (e.currentTarget.style.opacity = "0.85")}
                onMouseLeave={(e) => (e.currentTarget.style.opacity = "1")}
              >
                <Icons.Analysis />
                {label} 분석 시작
              </button>
            )}
          </div>
        )}

        {/* ANALYZING 상태: 진행률 */}
        {state === "analyzing" && (
          <div className="p-4">
            <div className="flex items-center gap-2 mb-3">
              <Icons.Spinner />
              <span className="text-xs font-medium" style={{ color: "var(--text)" }}>AI 분석 진행 중...</span>
            </div>
            <ProgressBar label={label} progress={progress} color={color} />
            <p className="text-[10px]" style={{ color: "var(--muted)" }}>약 30초~1분 소요됩니다</p>
          </div>
        )}

        {/* ERROR 상태 */}
        {state === "error" && (
          <div className="p-4">
            <div className="rounded-lg p-3 mb-3" style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)" }}>
              <p className="text-xs font-medium mb-0.5" style={{ color: "var(--error)" }}>분석 오류</p>
              <p className="text-[10px]" style={{ color: "var(--muted)" }}>{errorMsg}</p>
            </div>
            <button
              onClick={onRun}
              className="w-full py-2 rounded-lg text-xs font-medium"
              style={{ background: "var(--surface-hover)", color: "var(--text-secondary)", border: "1px solid var(--border)" }}
            >
              다시 시도
            </button>
          </div>
        )}

        {/* DONE 상태: 결과 + 다운로드 */}
        {state === "done" && (
          <div>
            {/* 액션 버튼 */}
            <div className="px-4 pt-3 pb-2 flex gap-2">
              <button
                onClick={onDownload}
                className="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs font-medium transition-all"
                style={{ background: color, color: "#fff" }}
                onMouseEnter={(e) => (e.currentTarget.style.opacity = "0.85")}
                onMouseLeave={(e) => (e.currentTarget.style.opacity = "1")}
              >
                <Icons.Download />
                Word 다운로드
              </button>
              <button
                onClick={onReset}
                className="px-3 py-2 rounded-lg text-xs transition-all"
                style={{ background: "var(--surface-hover)", color: "var(--text-secondary)", border: "1px solid var(--border)" }}
              >
                재분석
              </button>
            </div>

            {/* 결과 본문 */}
            <div
              className="px-4 pb-4 pt-2 text-sm leading-relaxed max-h-96 overflow-y-auto"
              style={{ color: "var(--text-secondary)", scrollbarWidth: "thin" }}
              dangerouslySetInnerHTML={{ __html: renderMarkdown(result) }}
            />
          </div>
        )}
      </div>
    </div>
  );
}

// ── 참여자 상세 & 분석 화면 ──
function ParticipantDetail({ response, onBack, gasUrl, geminiKey, claudeKey }) {
  // 오늘은 상태
  const [oneulState, setOneulState] = useState("idle");
  const [oneulResult, setOneulResult] = useState("");
  const [oneulProgress, setOneulProgress] = useState(0);
  const [oneulError, setOneulError] = useState("");

  // 자활 경로 선택 상태
  const [selectedPath, setSelectedPath] = useState(""); // "안정형" | "도전형" | "절충형" | "custom"
  const [customPath, setCustomPath] = useState("");

  // 내일로 상태
  const [naeirState, setNaeirState] = useState("idle");
  const [naeirResult, setNaeirResult] = useState("");
  const [naeirProgress, setNaeirProgress] = useState(0);
  const [naeirError, setNaeirError] = useState("");

  // 설문 응답을 텍스트로 변환
  const formatResponseData = () => {
    let text = `참여자 코드번호: ${response.code}\n소속: ${response.org}\n설문 응답일: ${response.timestamp}\n\n`;
    Object.entries(response.answers).forEach(([q, a]) => {
      const qIdx = parseInt(q);
      const label = QUESTION_MAP[qIdx] || `질문 ${q}`;
      text += `${label}\n→ ${a}\n\n`;
    });
    return text;
  };

  // 데모 응답 반환
  const getDemoResponse = (type) => {
    return type === "oneul"
      ? `## Part 1. 심층 DNA 분석\n\n### 1. 참여자 성향 심층 프로필 (DNA)\n\n이 참여자는 내면으로 에너지를 수렴시키는 성향으로, 외부 자극보다 내적 세계의 질서와 조화를 우선하는 인지 구조를 지니고 있다. 세상을 대하는 일차적 방어기제는 '감정 차단'이다. 타인의 감정에는 깊이 공명하면서도 정작 자신의 고통에 대해서는 인식 자체를 차단하는 패턴이 반복적으로 나타난다.\n\n기저 동기는 '안전한 연결'에 대한 갈망이다. 표면적으로는 독립적이고 자족적인 모습을 유지하지만, 그 이면에는 타인에게 짐이 되지 않으면서도 깊이 연결되고 싶은 모순적 욕구가 작동하고 있다.\n\n### 2. 인생 그래프 심층 서사 (Story)\n\n참여자가 선택한 단편적 지표들은 하나의 명확한 패턴으로 수렴한다. 가족과의 정서적 교류가 삶의 정점이었고, 심신의 고통이 삶의 저점이었다는 것. 이 두 축은 우연이 아닌 인과로 연결된다.\n\n가장 힘든 시간을 '고립'으로 버텼다는 응답은 핵심적 단서이다. 이것은 단순한 회피가 아니라, 고통을 드러내면 관계가 파괴될 것이라는 무의식적 믿음 체계의 발현이다.\n\n### 3. SWOT 심리 및 역량 진단\n\n> 강점(S)\n- 타인의 감정 상태를 빠르게 포착하는 높은 정서 지능\n- 목표 설정 후 포기하지 않는 집요한 완수 역량\n\n> 약점(W)\n- 자기 감정 표현의 만성적 억제\n- 도움 요청을 자존감 훼손으로 인식하는 경직된 신념\n\n> 기회(O)\n- 안정적 환경에서의 신뢰 관계 형성 가능성\n- 섬세한 감수성을 활용한 서비스/돌봄 직무 적합성\n\n> 위협(T)\n- 장기 고립 시 감정 폭발 또는 무력감으로의 급격한 전환\n- 완벽주의적 기준으로 인한 자기 비하 사이클\n\n### 4. IAP 개인별 자립지원 계획 설계\n\n> IAP 설계 목적: 안전한 관계 경험을 통해 고립이라는 생존 기제를 점진적으로 해제하고, 정서 지능을 자활 직무 역량으로 전환하는 것\n\n- 핵심 방향성\n  - 1년차: 신뢰할 수 있는 단 한 명의 관계 구축 + 규칙적 출퇴근 안정화\n  - 2년차: 소규모 팀 협업 경험 + 직무 기술 습득\n  - 3년차: 자립 경로 확정 및 독립 준비\n\n- 직무 배치 전략\n  - 안정형: 정리 정돈, 재고 관리 등 독립적 업무\n  - 도전형: 고객 응대가 포함된 서비스 업무\n  - 절충형: 후방 지원 + 제한된 대면 업무`
      : `### 1. 3년 자활 로드맵 및 당해 연도 분기별 계획\n\n> '고립이라는 오래된 생존 전략을 내려놓고, 안전한 연결 속에서 나만의 속도로 자립의 길을 걸어가는 3년의 여정'\n\n- [1년차 핵심 목표]: 안정적 근태 확립과 신뢰 관계 1인 형성\n  - 1분기: 주 5일 출근 루틴 정착, 담당자와 주 1회 5분 대화 시작\n  - 2분기: 직무 기초 교육 참여, 팀 내 인사 나누기 실천\n  - 3분기: 소규모 협업 과제 1회 참여, 감정 일기 주 2회 작성\n  - 4분기: 1년차 성찰 및 2년차 목표 공동 설정\n\n- [2년차 핵심 목표]: 직무 역량 강화 및 팀 내 역할 확대\n- [3년차 핵심 목표]: 자립 경로 확정 및 외부 취업/창업 준비\n\n### 2. 당월 실천 계획 및 모더레이션 지표\n\n- 당월 핵심 목표: 주 5일 출근 유지 + 담당자와 주 1회 자연스러운 대화\n- 직무 실천: 내일 출근 후 작업 공간을 10분간 정리하고, 오늘 할 일 1가지를 메모지에 적어 붙이기\n- 생활 실천: 매일 아침 창문을 열고 바깥 공기를 5분간 마시며 심호흡하기\n- 위험 통제 지표: 3일 연속 점심을 혼자 먹으면 담당자에게 먼저 말 한마디 건네기\n\n### 3. 주간 모니터링 일지 및 월말 동적 점검표\n\n- [ ] 환경 안정 (근태): 이번 주 5일 중 몇 일 출근했나요?\n- [ ] 위험 관리 (방어막 유지): 혼자 있고 싶은 충동이 3일 이상 지속되지는 않았나요?\n- [ ] 당월 실천 (루틴/목표): 아침 심호흡과 작업 공간 정리를 실천했나요?\n- 금주 상담/성찰 주제: __________________________________________________\n- 감정 상태: ( ) 긍정 / ( ) 보통 / ( ) 부정 / ( ) 에너지 고갈\n- 슈퍼바이저 월말 평가: 당월 달성도 및 차월 목표 변경안 기재`;
  };

  // Google Gemini API 호출 (오늘은 분석용)
  const callGemini = async (systemPrompt, userMessage) => {
    if (!geminiKey) {
      return new Promise((resolve) => setTimeout(() => resolve(getDemoResponse("oneul")), 3000));
    }

    const res = await fetch(`${CONFIG.GEMINI_API_URL}?key=${geminiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: "user", parts: [{ text: userMessage }] }],
        generationConfig: {
          temperature: 0.7,
          maxOutputTokens: 8192,
        },
      }),
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || `Gemini API 오류 (${res.status})`);
    }

    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error("Gemini API에서 응답을 받지 못했습니다");
    return text;
  };

  // Claude API 호출 (내일로 분석용)
  const callClaude = async (systemPrompt, userMessage) => {
    if (!claudeKey) {
      return new Promise((resolve) => setTimeout(() => resolve(getDemoResponse("naeir")), 3000));
    }

    const res = await fetch(CONFIG.CLAUDE_API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": claudeKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: CONFIG.CLAUDE_MODEL,
        max_tokens: 8192,
        system: systemPrompt,
        messages: [{ role: "user", content: userMessage }],
      }),
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || `Claude API 오류 (${res.status})`);
    }

    const data = await res.json();
    const text = data.content?.[0]?.text;
    if (!text) throw new Error("Claude API에서 응답을 받지 못했습니다");
    return text;
  };

  // 오늘은 분석 실행
  const runOneul = async () => {
    setOneulState("analyzing");
    setOneulProgress(0);
    setOneulError("");
    try {
      const responseData = formatResponseData();
      const timer = setInterval(() => setOneulProgress((p) => Math.min(p + 5, 90)), 500);
      const result = await callGemini(ONEUL_PROMPT, `다음 참여자 데이터를 분석해 주십시오.\n\n${responseData}\n\n오늘은 분석해줘`);
      clearInterval(timer);
      setOneulProgress(100);
      setOneulResult(result);
      setOneulState("done");
    } catch (err) {
      setOneulState("error");
      setOneulError(err.message);
    }
  };

  // 내일로 분석 실행
  const getSelectedPathText = () => {
    if (selectedPath === "custom") return customPath;
    return selectedPath;
  };

  const runNaeir = async () => {
    setNaeirState("analyzing");
    setNaeirProgress(0);
    setNaeirError("");
    try {
      const pathText = getSelectedPathText();
      let inputData;
      if (oneulResult) {
        // 오늘은 결과 + 확정 경로 포함
        inputData = `=== 심층 분석 리포트 내용 ===\n${oneulResult}\n\n=== 확정된 자활 경로 ===\n${pathText ? `담당자가 선택한 자활 경로: '${pathText}'\n이 경로에 맞춰 3년 로드맵과 실행 계획을 설계하십시오.` : "(오늘은 분석에서 도출된 IAP 내용 기반)"}\n\n위 내용을 바탕으로 내일로 분석해줘`;
      } else {
        // 오늘은 없이 설문 데이터만으로 실행
        const responseData = formatResponseData();
        inputData = `다음 참여자 데이터를 바탕으로 실행 계획을 설계해 주십시오.\n\n${responseData}\n\n${pathText ? `담당자가 선택한 자활 경로: '${pathText}'\n이 경로에 맞춰 설계하십시오.\n\n` : ""}내일로 분석해줘`;
      }
      const timer = setInterval(() => setNaeirProgress((p) => Math.min(p + 5, 90)), 500);
      const result = await callClaude(NAEIRO_PROMPT, inputData);
      clearInterval(timer);
      setNaeirProgress(100);
      setNaeirResult(result);
      setNaeirState("done");
    } catch (err) {
      setNaeirState("error");
      setNaeirError(err.message);
    }
  };

  // 개별 Word 다운로드
  const downloadOneulWord = () => {
    const report = `# 프로젝트 내일로 - 심층 DNA 분석 리포트\n\n참여자: ${response.code}\n소속: ${response.org}\n분석일: ${new Date().toLocaleDateString("ko-KR")}\n\n---\n\n${oneulResult}\n\n---\n\n> 충북청주지역자활센터 프로젝트 내일로 ${CONFIG.APP_VERSION}\n> 오늘은 프롬프트: 심층 심리 및 서사 분석`;
    downloadAsWord(report, `오늘은_분석_${response.code}`);
  };

  const downloadNaeirWord = () => {
    const report = `# 프로젝트 내일로 - 실행 계획 설계 리포트\n\n참여자: ${response.code}\n소속: ${response.org}\n분석일: ${new Date().toLocaleDateString("ko-KR")}\n\n---\n\n${naeirResult}\n\n---\n\n> 충북청주지역자활센터 프로젝트 내일로 ${CONFIG.APP_VERSION}\n> 내일로 프롬프트: 구체적 실행 계획 수립`;
    downloadAsWord(report, `내일로_분석_${response.code}`);
  };

  // 통합 Word 다운로드
  const downloadIntegratedWord = () => {
    const report = `# 프로젝트 내일로 종합 분석 리포트\n\n참여자: ${response.code}\n소속: ${response.org}\n분석일: ${new Date().toLocaleDateString("ko-KR")}\n\n---\n\n## Part 1. 심층 DNA 분석 (오늘은)\n\n${oneulResult}\n\n---\n\n## Part 2. 실행 계획 설계 (내일로)\n\n${naeirResult}\n\n---\n\n> 본 리포트는 2개의 독립적인 AI 분석 프롬프트를 통해 생성되었습니다.\n> - 오늘은 프롬프트: 심층 심리 및 서사 분석\n> - 내일로 프롬프트: 구체적 실행 계획 수립\n>\n> 충북청주지역자활센터 프로젝트 내일로 ${CONFIG.APP_VERSION}`;
    downloadAsWord(report, `내일로_종합리포트_${response.code}`);
  };

  const downloadAsWord = (markdown, filename) => {
    const htmlContent = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
      <head><meta charset="utf-8"><style>
        body { font-family: '맑은 고딕', 'Malgun Gothic', sans-serif; font-size: 11pt; line-height: 1.8; color: #1a1a1a; }
        h1 { font-size: 18pt; color: #1a365d; border-bottom: 2px solid #2b6cb0; padding-bottom: 8pt; margin-top: 20pt; }
        h2 { font-size: 14pt; color: #2c5282; border-bottom: 1px solid #bee3f8; padding-bottom: 6pt; margin-top: 16pt; }
        h3 { font-size: 12pt; color: #2d3748; margin-top: 12pt; }
        blockquote { border-left: 3px solid #4299e1; padding-left: 12pt; color: #4a5568; font-style: italic; margin: 8pt 0; }
        hr { border: none; border-top: 1px solid #e2e8f0; margin: 16pt 0; }
      </style></head>
      <body>${renderMarkdown(markdown)}</body></html>`;
    const blob = new Blob(["\ufeff", htmlContent], { type: "application/msword" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${filename}_${new Date().toISOString().split("T")[0]}.doc`;
    a.click();
    URL.revokeObjectURL(url);
  };

function App() {
  const [user, setUser] = useState(null);
  const [responses, setResponses] = useState([]);
  const [selectedResponse, setSelectedResponse] = useState(null);
  const [searchTerm, setSearchTerm] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [gasUrl, setGasUrl] = useState(CONFIG.GAS_PROXY_URL);
  const [geminiKey, setGeminiKey] = useState(() => localStorage.getItem("naeilro_gemini_key") || "");
  const [claudeKey, setClaudeKey] = useState(() => localStorage.getItem("naeilro_claude_key") || "");
  const [loading, setLoading] = useState(false);
  const [loadError, setLoadError] = useState("");

  // GAS에서 실제 설문 응답 불러오기
  const fetchResponses = async (url) => {
    setLoading(true);
    setLoadError("");
    try {
      const res = await fetch(url + "?action=responses");
      const data = await res.json();
      if (data.success && data.responses) {
        setResponses(data.responses);
      } else {
        setLoadError(data.error || "응답을 불러올 수 없습니다");
        setResponses(DEMO_RESPONSES);
      }
    } catch (err) {
      setLoadError("서버 연결 실패: " + err.message);
      setResponses(DEMO_RESPONSES);
    }
    setLoading(false);
  };

  // 로그인 성공 시 데이터 로딩
  const handleLogin = (userData) => {
    setUser(userData);
    if (gasUrl) {
      fetchResponses(gasUrl);
    } else {
      setResponses(DEMO_RESPONSES);
    }
  };

  // GAS URL 변경 시 데이터 재로딩
  useEffect(() => {
    if (user && gasUrl) {
      fetchResponses(gasUrl);
    }
  }, [gasUrl]);

  return (
    <>
      <style>{cssVars}</style>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        input::placeholder { color: var(--muted); }
      `}</style>

      <div className="min-h-screen" style={{ background: "var(--bg)", color: "var(--text)", fontFamily: "var(--font-body)" }}>
        {!user ? (
          <LoginScreen onLogin={handleLogin} />
        ) : (
          <div className="max-w-lg mx-auto min-h-screen flex flex-col">
            {/* 상단 네비게이션 */}
            <header
              className="sticky top-0 z-40 px-4 py-3 flex items-center justify-between"
              style={{
                background: "rgba(12,14,18,0.85)",
                backdropFilter: "blur(12px)",
                borderBottom: "1px solid var(--border-light)",
              }}
            >
              <div className="flex items-center gap-2.5">
                <div style={{ color: "var(--accent)" }}>
                  <Icons.Logo />
                </div>
                <div>
                  <h1 className="text-sm font-bold tracking-tight" style={{ color: "var(--heading)" }}>
                    프로젝트 내일로
                  </h1>
                  <p className="text-[10px]" style={{ color: "var(--muted)" }}>
                    AI 참여자 분석 시스템
                  </p>
                </div>
              </div>

              <div className="flex items-center gap-2">
                <button
                  onClick={() => setShowSettings(true)}
                  className="p-2 rounded-lg text-xs"
                  style={{ color: "var(--muted)" }}
                >
                  ⚙
                </button>
                <button
                  onClick={() => setUser(null)}
                  className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs transition-colors"
                  style={{ color: "var(--muted)" }}
                  onMouseEnter={(e) => (e.currentTarget.style.background = "var(--surface-hover)")}
                  onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}
                >
                  <Icons.Logout />
                  <span>{user.name}</span>
                </button>
              </div>
            </header>

            {/* 메인 콘텐츠 */}
            <main className="flex-1 p-4">
              {/* 데모 모드 알림 */}
              {(!gasUrl || !geminiKey || !claudeKey) && (
                <div
                  className="rounded-xl p-3 mb-4 flex items-start gap-2"
                  style={{ background: "rgba(251,191,36,0.06)", border: "1px solid rgba(251,191,36,0.15)" }}
                >
                  <span className="text-sm mt-0.5">⚡</span>
                  <div>
                    <p className="text-xs font-medium" style={{ color: "var(--warning)" }}>
                      {!geminiKey && !claudeKey && !gasUrl ? "데모 모드" : "일부 데모 모드"}
                    </p>
                    <p className="text-xs mt-0.5 space-y-0.5" style={{ color: "var(--muted)" }}>
                      {!geminiKey && <span className="block">🔴 Gemini API Key 미설정 → 오늘은 분석이 데모로 동작</span>}
                      {!claudeKey && <span className="block">🔴 Claude API Key 미설정 → 내일로 분석이 데모로 동작</span>}
                      {!gasUrl && <span className="block">🔴 GAS URL 미설정 → 샘플 데이터로 동작</span>}
                      <span className="block mt-1">설정(⚙)에서 API Key를 입력하세요.</span>
                    </p>
                  </div>
                </div>
              )}

              {/* 로딩 상태 */}
              {loading && (
                <div className="flex items-center justify-center gap-2 py-8">
                  <Icons.Spinner />
                  <span className="text-sm" style={{ color: "var(--text-secondary)" }}>설문 응답을 불러오는 중...</span>
                </div>
              )}

              {/* 에러 메시지 */}
              {loadError && (
                <div className="rounded-xl p-3 mb-4 flex items-start gap-2"
                  style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)" }}>
                  <span className="text-sm mt-0.5">⚠️</span>
                  <div className="flex-1">
                    <p className="text-xs font-medium" style={{ color: "var(--error)" }}>데이터 로딩 실패</p>
                    <p className="text-xs mt-0.5" style={{ color: "var(--muted)" }}>{loadError}</p>
                    <p className="text-xs mt-1" style={{ color: "var(--muted)" }}>샘플 데이터로 표시합니다.</p>
                  </div>
                  <button onClick={() => fetchResponses(gasUrl)} className="text-xs px-2 py-1 rounded-lg"
                    style={{ background: "var(--surface-hover)", color: "var(--text-secondary)", border: "1px solid var(--border)" }}>
                    재시도
                  </button>
                </div>
              )}

              {/* 메인 영역 */}
              {!loading && (selectedResponse ? (
                <ParticipantDetail
                  response={selectedResponse}
                  onBack={() => setSelectedResponse(null)}
                  gasUrl={gasUrl}
                  geminiKey={geminiKey}
                  claudeKey={claudeKey}
                />
              ) : (
                <>
                  {/* 새로고침 버튼 */}
                  {gasUrl && !loadError && (
                    <div className="flex justify-end mb-2">
                      <button onClick={() => fetchResponses(gasUrl)} className="text-[10px] px-2 py-1 rounded-lg flex items-center gap-1"
                        style={{ color: "var(--muted)" }}
                        onMouseEnter={(e) => e.currentTarget.style.background = "var(--surface-hover)"}
                        onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
                        🔄 새로고침
                      </button>
                    </div>
                  )}
                  <ResponseList
                    responses={responses}
                    onSelect={setSelectedResponse}
                    searchTerm={searchTerm}
                    setSearchTerm={setSearchTerm}
                  />
                </>
              ))}
            </main>

            {/* 하단 정보 */}
            <footer className="p-4 text-center">
              <p className="text-[10px]" style={{ color: "var(--muted)" }}>
                충북청주지역자활센터 &middot; 프로젝트 내일로 {CONFIG.APP_VERSION}
              </p>
            </footer>
          </div>
        )}
      </div>

      {/* 설정 모달 */}
      <SettingsModal show={showSettings} onClose={() => setShowSettings(false)} gasUrl={gasUrl} setGasUrl={setGasUrl} geminiKey={geminiKey} setGeminiKey={setGeminiKey} claudeKey={claudeKey} setClaudeKey={setClaudeKey} />
    </>
  );
}

// ── 앱 렌더링 ──
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
